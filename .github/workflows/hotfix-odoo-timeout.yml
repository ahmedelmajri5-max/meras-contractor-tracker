name: Hotfix Odoo timeout

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hotfix-odoo-timeout.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch files
        run: |
          node <<'NODE'
          const fs = require('fs');
          function patch(file, edits) {
            let text = fs.readFileSync(file, 'utf8');
            for (const [from, to] of edits) {
              if (!text.includes(from)) throw new Error(`Missing patch target in ${file}: ${from.slice(0, 80)}`);
              text = text.replace(from, to);
            }
            fs.writeFileSync(file, text);
          }
          patch('server.js', [
            ['const RPC_TIMEOUT_MS = Number(process.env.ODOO_RPC_TIMEOUT_MS || 8000);', 'const RPC_TIMEOUT_MS = Number(process.env.ODOO_RPC_TIMEOUT_MS || 15000);'],
            ['const LIGHT_CHUNK_SIZE = Number(process.env.ODOO_LIGHT_CHUNK_SIZE || 50);', 'const LIGHT_CHUNK_SIZE = Number(process.env.ODOO_LIGHT_CHUNK_SIZE || 100);'],
            ['const LIGHT_CHUNK_CONCURRENCY = Number(process.env.ODOO_LIGHT_CHUNK_CONCURRENCY || 6);', 'const LIGHT_CHUNK_CONCURRENCY = Number(process.env.ODOO_LIGHT_CHUNK_CONCURRENCY || 4);'],
            ['async function cached(key, fn, ttl = CACHE_MS) { const hit = cache.get(key); if (hit && hit.expiresAt > Date.now()) return hit.value; const value = await fn(); cache.set(key, { value, expiresAt: Date.now() + ttl }); return value; }', 'async function cached(key, fn, ttl = CACHE_MS) { const hit = cache.get(key); if (hit && hit.expiresAt > Date.now()) return hit.value; try { const value = await fn(); cache.set(key, { value, expiresAt: Date.now() + ttl }); return value; } catch (error) { if (hit) return hit.value; throw error; } }'],
            ['async function getFinancialTotals(domain) { return totalsFromLightRows(await getLightRows(domain)); }', 'async function getGroupedFinancialTotals(domain) { const groups = await odooRead("project.task", "read_group", [domain, ["task_type_work_order", "total_points:sum", "total_payment:sum", "total_payment_request:sum"], ["task_type_work_order"]], { lazy: false }); return groups.reduce((acc, group) => { const status = group.task_type_work_order || ""; const totalAmount = number(group.total_points); const paidAmount = number(group.total_payment); const requestedAmount = number(group.total_payment_request); const inProcessAmount = Math.max(requestedAmount - paidAmount, 0); const remainingAmount = Math.max(totalAmount - paidAmount - inProcessAmount, 0); const count = number(group.task_type_work_order_count || group.__count); acc.count += count; acc.totalAmount += totalAmount; acc.inProcessAmount += inProcessAmount; acc.paidAmount += paidAmount; acc.remainingAmount += remainingAmount; acc.byStatus[status] = { status, label: statusLabel(status), count }; return acc; }, { count: 0, totalAmount: 0, inProcessAmount: 0, paidAmount: 0, remainingAmount: 0, byStatus: {} }); }\nasync function getFinancialTotals(domain) { return cached(`groupTotals:${JSON.stringify(domain)}`, async () => { try { return await getGroupedFinancialTotals(domain); } catch (error) { return totalsFromLightRows(await getLightRows(domain)); } }, 10 * 60 * 1000); }'],
            ['async function getDashboard(url) { const contractorId = Number(url.searchParams.get("contractorId") || 0); const extra = contractorId ? [["contractor_id", "=", contractorId]] : []; const domain = baseDomain(extra); const [latestRows, totals] = await Promise.all([odooRead("project.task", "search_read", [domain], { fields: workOrderFields, limit: 5, order: "write_date desc" }), getFinancialTotals(domain)]); const latest = latestRows.map(mapWorkOrder); const statuses = ["draft", "approved", "confirm", "cancel", "done"]; const counts = await Promise.all(statuses.map(status => odooRead("project.task", "search_count", [baseDomain([...extra, ["task_type_work_order", "=", status]])]))); statuses.forEach((status, index) => { totals.byStatus[status] = totals.byStatus[status] || { status, label: statusLabel(status), count: 0 }; totals.byStatus[status].count = counts[index]; }); return { companyId: config.companyId, loadedAt: new Date().toISOString(), totals, latest }; }', 'async function getDashboard(url) { const contractorId = Number(url.searchParams.get("contractorId") || 0); const extra = contractorId ? [["contractor_id", "=", contractorId]] : []; const domain = baseDomain(extra); const [latestRows, totals] = await Promise.all([odooRead("project.task", "search_read", [domain], { fields: workOrderFields, limit: 5, order: "write_date desc" }), getFinancialTotals(domain)]); const latest = latestRows.map(mapWorkOrder); ["draft", "approved", "confirm", "cancel", "done"].forEach(status => { totals.byStatus[status] = totals.byStatus[status] || { status, label: statusLabel(status), count: 0 }; }); return { companyId: config.companyId, loadedAt: new Date().toISOString(), totals, latest }; }']
          ]);
          patch('public/app.js', [
            ['    order.paidDate = order.paidAmount > 0 ? order.updatedAt : "";', '    order.paidDate = order.paidAmount > 0 ? (latestPaymentDate || order.updatedAt) : "";'],
            ['async function refreshAll() {\n  try {\n    state.page = 1;\n    await Promise.all([loadDashboard(), loadOrders()]);\n  } catch (error) { setNotice(error.message, "error"); }\n}', 'async function refreshAll() {\n  state.page = 1;\n  const results = await Promise.allSettled([loadDashboard(), loadOrders()]);\n  const failed = results.find(result => result.status === "rejected");\n  if (failed) setNotice(`${failed.reason.message} - تم تحميل الجزء المتاح، حاول التحديث مرة ثانية.`, "error");\n}']
          ]);
          NODE
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/hotfix-odoo-timeout.yml
          git add server.js public/app.js
          git commit -m "Fix Odoo dashboard timeout handling"
          git push
