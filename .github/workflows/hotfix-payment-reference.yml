name: Hotfix payment references

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hotfix-payment-reference.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch payment references
        run: |
          node <<'NODE'
          const fs = require('fs');
          function replace(file, from, to) {
            let text = fs.readFileSync(file, 'utf8');
            if (!text.includes(from)) throw new Error(`Missing target in ${file}: ${from.slice(0, 120)}`);
            text = text.replace(from, to);
            fs.writeFileSync(file, text);
          }
          replace('server.js',
            'async function getPayments(url) { const taskId = Number(url.searchParams.get("taskId") || 0); const contractorId = Number(url.searchParams.get("contractorId") || 0); if (!taskId) return { rows: [] }; if (contractorId) { const allowed = await odooRead("project.task", "search_count", [baseDomain([["id", "=", taskId], ["contractor_id", "=", contractorId]])]); if (!allowed) { const error = new Error("This work order is outside the contractor scope."); error.status = 403; throw error; } } const rows = await odooRead("task.payment", "search_read", [[["task_id", "=", taskId]]], { fields: ["id", "task_id", "payment", "payment_number", "payment_term", "payment_type", "write_date"], limit: 100, order: "payment_number asc, id asc" }); return { rows }; }',
            'async function getPayments(url) { const taskId = Number(url.searchParams.get("taskId") || 0); const contractorId = Number(url.searchParams.get("contractorId") || 0); if (!taskId) return { rows: [] }; if (contractorId) { const allowed = await odooRead("project.task", "search_count", [baseDomain([["id", "=", taskId], ["contractor_id", "=", contractorId]])]); if (!allowed) { const error = new Error("This work order is outside the contractor scope."); error.status = 403; throw error; } } const rows = await odooRead("approval.request", "search_read", [[["work_order_id", "=", taskId]]], { fields: ["id", "name", "display_name", "reference", "request_status", "request_status_custom", "payment_status", "billed", "bill_date", "date", "create_date", "write_date", "work_order_id"], limit: 100, order: "bill_date asc, id asc" }); return { rows: rows.map(row => ({ ...row, payment_reference: row.name || row.display_name || row.reference || String(row.id), payment_number: row.name || row.display_name || row.reference || String(row.id), payment_term: row.request_status_custom || row.request_status || "", payment_type: row.payment_status || row.billed || "", payment_date: row.bill_date || row.date || row.create_date || row.write_date })) }; }'
          );
          replace('public/app.js',
            '    const refsList = [...new Set((payload.rows || []).map(row => String(row.payment_number || row.id || "").trim()).filter(Boolean))];\n    const latestPaymentDate = (payload.rows || []).map(row => row.write_date).filter(Boolean).sort().at(-1) || "";',
            '    const refsList = [...new Set((payload.rows || []).map(row => String(row.payment_reference || row.name || row.display_name || row.payment_number || row.id || "").trim()).filter(Boolean))];\n    const latestPaymentDate = (payload.rows || []).map(row => row.payment_date || row.bill_date || row.date || row.write_date || row.create_date).filter(Boolean).sort().at(-1) || "";'
          );
          replace('public/app.js',
            '<h3>\\u062f\\u0641\\u0639\\u0627\\u062a / \\u0634\\u0631\\u0648\\u0637 \\u0627\\u0644\\u062f\\u0641\\u0639</h3><div class="order-list">${payments.rows.map(row => `<div class="mini-order"><b>\\u062f\\u0641\\u0639\\u0629 ${escapeHtml(row.payment_number || "-")}</b><small>${escapeHtml(row.payment_term || "-")} - ${escapeHtml(row.payment_type || row.payment || "-")}</small></div>`).join("") || `<div class="alert">\\u0644\\u0627 \\u062a\\u0648\\u062c\\u062f \\u062f\\u0641\\u0639\\u0627\\u062a \\u0645\\u0642\\u0631\\u0648\\u0621\\u0629 \\u0644\\u0647\\u0630\\u0627 \\u0627\\u0644\\u0623\\u0645\\u0631.</div>`}</div>`;',
            '<h3>\\u0623\\u0648\\u0627\\u0645\\u0631 \\u0627\\u0644\\u0633\\u062f\\u0627\\u062f</h3><div class="order-list">${payments.rows.map(row => `<div class="mini-order"><b>\\u0623\\u0645\\u0631 \\u0633\\u062f\\u0627\\u062f ${escapeHtml(row.payment_reference || row.name || row.display_name || row.payment_number || "-")}</b><small>${escapeHtml(row.payment_term || "-")} - ${escapeHtml(row.payment_type || row.payment || "-")} - ${fmtDate(row.payment_date || row.bill_date || row.date || row.write_date || row.create_date)}</small></div>`).join("") || `<div class="alert">\\u0644\\u0627 \\u062a\\u0648\\u062c\\u062f \\u0623\\u0648\\u0627\\u0645\\u0631 \\u0633\\u062f\\u0627\\u062f \\u0645\\u0642\\u0631\\u0648\\u0621\\u0629 \\u0644\\u0647\\u0630\\u0627 \\u0627\\u0644\\u0623\\u0645\\u0631.</div>`}</div>`;'
          );
          NODE
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/hotfix-payment-reference.yml
          git add server.js public/app.js
          git commit -m "Use approval request numbers for payment references"
          git push
