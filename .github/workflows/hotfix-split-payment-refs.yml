name: Hotfix split payment refs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app
        run: node .github/workflows/patch-split-payment-refs.js
      - name: Check syntax
        run: node --check public/app.js
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/hotfix-split-payment-refs.yml .github/workflows/patch-split-payment-refs.js
          git add public/app.js
          git commit -m "Split paid and in-process payment references"
          git push
